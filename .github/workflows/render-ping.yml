# Pings your Render web service on a schedule so the free tier is less likely to sleep.
# Add repo secret RENDER_URL = https://your-service.onrender.com (no trailing slash needed)
name: Render keep-alive ping

on:
  schedule:
    # Every 10 minutes (UTC). Adjust if needed; free Render often idles ~15 min without traffic.
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render URL
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
        run: |
          if [ -z "$RENDER_URL" ]; then
            echo "::error::RENDER_URL secret is not set. Repo → Settings → Secrets → Actions → add RENDER_URL"
            exit 1
          fi
          curl -fsS --max-time 30 -o /dev/null "$RENDER_URL"
          echo "OK: $RENDER_URL"
